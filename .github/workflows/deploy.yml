name: 部署飞书监控服务

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 迁出代码
        uses: actions/checkout@v4

      - name: 发布到服务器
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avzr --delete --mkpath"
          SOURCE: "/"
          EXCLUDE: "/.git/, /.venv/, /.idea/, /__pycache__/"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          REMOTE_USER: root
          TARGET: /home/apps/lark-monitor-server/
          SCRIPT_AFTER: |
            cd /home/apps/lark-monitor-server
            echo "${{ secrets.ENV }}" > .env

            # 安装 uv（如果未安装）
            if ! command -v uv &> /dev/null; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
            fi
            export PATH="$HOME/.local/bin:$PATH"

            uv sync --frozen

            # 部署 systemd 服务（首次或配置变更时）
            if ! diff -q deploy/lark-monitor.service /etc/systemd/system/lark-monitor.service &> /dev/null 2>&1; then
              cp deploy/lark-monitor.service /etc/systemd/system/lark-monitor.service
              systemctl daemon-reload
              systemctl enable lark-monitor
            fi

            systemctl restart lark-monitor
            sleep 3
            systemctl is-active lark-monitor
